<!DOCTYPE html>
<html>

<head>
    <title>Ejercicio 2_5</title>
    <meta charset="UTF-8">
</head>

<body>

    <script>
        const a = 10;
        const b = 5;

        // Calculamos la suma
        const suma = a + b;

        // Calculamos el producto (multiplicación)
        const producto = a * b;

        // Mostramos ambos resultados. 
        // '\n' sirve para hacer un salto de línea dentro de la alerta.
        alert(`La suma de a + b es: ${suma}\nEl producto de a * b es: ${producto}`);
    </script>
</body>

</html>
