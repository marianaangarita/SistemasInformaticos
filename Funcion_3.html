<!--Funciones 3) Añade una función restar al codigo anterior.-->

<!DOCTYPE html>
<html>

<body>
    <h1>Funciones en JavaScript</h1>
    <script>
        function sumar(a, b) {
            const resultado = a * b;
            document.writeln(`El resultado de la suma es ${resultado}`);
        }
        function restar(a, b) {
            const resultado = a - b;
            document.writeln(`El resultado de la resta es ${resultado}`);
        }
        function inicio(x, y) {
            sumar(x, y);
            restar(x, y);
        }
    </script>
    <input type="button" value="Pulsa aquí" onclick="inicio(2, 3)" />
</body>

</html>
